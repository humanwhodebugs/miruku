# --- General Settings ---
set-option -g mouse on                      # Enable mouse support
set-option -g history-limit 10000           # Longer scrollback buffer
set-option -g allow-rename on               # Don't rename windows automatically
set-option -g status-interval 5             # Refresh status bar every 5 seconds

# --- Keybindings ---
unbind C-b                                  # Unbind default prefix
set-option -g prefix C-a                    # Change prefix to Ctrl + a
bind-key C-a send-prefix                    # Send prefix if needed

# --- Pane Management ---
bind | split-window -h                      # Split pane horizontally
bind - split-window -v                      # Split pane vertically
bind x kill-pane                            # Close active pane
bind c new-window                           # Create new window
bind & kill-window                          # Close active window

# --- Pane Navigation (Vim Style) ---
bind h select-pane -L                       # Move to left pane
bind j select-pane -D                       # Move to bottom pane
bind k select-pane -U                       # Move to top pane
bind l select-pane -R                       # Move to right pane

# --- Resize Panes (Prefix + Alt + hjkl) ---
bind -n M-h resize-pane -L 5                # Resize left
bind -n M-j resize-pane -D 5                # Resize down
bind -n M-k resize-pane -U 5                # Resize up
bind -n M-l resize-pane -R 5                # Resize right

# --- Copy Mode (Vim Style) ---
setw -g mode-keys vi                        # Use vim keybindings in copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection # Start selection with 'v'
bind-key -T copy-mode-vi 'y' send -X copy-selection # Copy with 'y'

# --- Start Window Numbering at 1 ---
set -g base-index 1
setw -g pane-base-index 1

# --- Reload Config ---
bind r source-file ~/.tmux.conf \; display-message "Config Reloaded!"

# Options to make tmux more pleasant
set -g default-terminal "tmux-256color"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'

# Configure Catppuccin
set -g @catppuccin_flavor "latte"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_surface2},fg=#{@thm_base},bold]  #S },#{#[bg=#{@thm_base},fg=#{@thm_text}]  #S }}"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_surface2},none]│"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_text}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_surface2},none]│"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_text}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_surface2},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_text}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_surface2},fg=#{@thm_base}]},#{#[bg=#{@thm_base},fg=#{@thm_text}]}} #{battery_percentage} "
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_surface2}, none]│"
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_text}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# bootstrap tpm
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Configure Tmux
set -g status-position top
set -g status-style "bg=#{@thm_base}"
set -g status-justify "absolute-centre"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_base},fg=#{@thm_surface2}"
setw -g pane-border-style "bg=#{@thm_base},fg=#{@thm_surface2}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_base},fg=#{@thm_text}"
set -g window-status-last-style "bg=#{@thm_base},fg=#{@thm_text}"
set -g window-status-activity-style "bg=#{@thm_surface2},fg=#{@thm_base}"
set -g window-status-bell-style "bg=#{@thm_surface2},fg=#{@thm_base},bold"
set -gF window-status-separator "#[bg=#{@thm_base},fg=#{@thm_surface2}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_surface2},fg=#{@thm_base},bold"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
